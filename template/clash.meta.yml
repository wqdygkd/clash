# port: 78901
# socks-port: 7891
# redir-port: 7892
# tproxy-port: 7893
mixed-port: 7890
allow-lan: false
bind-address: 127.0.0.1
mode: rule
log-level: info
# external-controller: ""
# 如将 allow-lan 改为 true 并监听到局域网，务必设置 secret
# secret: "change-me-to-a-strong-random-string"

proxies:

proxy-providers:
  my:
    type: http
    path: ./proxy_providers/my.yaml
    url: https://gist.githubusercontent.com/wqdygkd/194197b017a46fdf078fc1ced29ffc35/raw/
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - {
      name: "节点选择",
      type: select,
      proxies: [ 自动选择, 全球直连 ],
      use: [my],
      icon: https://cdn.jsdelivr.net/gh/wqdygkd/clash@main/IconSet/rocket_color.svg,
    }
  - {
      name: 自动选择,
      type: url-test,
      proxies: [],
      use: [my],
      url: http://www.gstatic.com/generate_204,
      interval: 86400,
      icon: https://cdn.jsdelivr.net/gh/wqdygkd/clash@main/IconSet/26a1.svg,
    }
  - {
      name: 网易云音乐,
      type: select,
      proxies: [ 全球直连, 节点选择 ],
      use: [my],
      icon: https://cdn.jsdelivr.net/gh/wqdygkd/clash@main/IconSet/netease-music.svg,
    }
  - {
      name: Cursor,
      type: select,
      proxies: [ 全球直连, 节点选择 ],
      use: [my],
      icon: https://cdn.jsdelivr.net/gh/wqdygkd/clash@main/IconSet/cursor.svg,
    }
  - {
      name: QQ音乐,
      type: select,
      proxies: [ 全球直连, 节点选择 ],
      use: [my],
      icon: https://cdn.jsdelivr.net/gh/wqdygkd/clash@main/IconSet/qq-music.svg,
    }
  - {
      name: 抖音,
      type: select,
      proxies: [ 全球直连, 节点选择 ],
      use: [my],
      icon: https://cdn.jsdelivr.net/gh/wqdygkd/clash@main/IconSet/douyin.svg,
    }
  - {
      name: Apple,
      type: select,
      proxies: [ 全球直连, 节点选择 ],
      use: [my],
      icon: https://cdn.jsdelivr.net/gh/wqdygkd/clash@main/IconSet/apple.svg,
    }
  - {
      name: 全球直连,
      type: select,
      proxies: [ DIRECT ],
      icon: https://cdn.jsdelivr.net/gh/wqdygkd/clash@main/IconSet/1f3af.svg,
    }
  - {
      name: 电报信息,
      type: select,
      proxies: [ 节点选择 ],
      use: [my],
      icon: https://cdn.jsdelivr.net/gh/wqdygkd/clash@main/IconSet/telegram.svg,
    }
  - {
      name: 全球拦截,
      type: select,
      proxies: [ REJECT, DIRECT ],
      icon: https://cdn.jsdelivr.net/gh/wqdygkd/clash@main/IconSet/block.svg,
    }
  - {
      name: 漏网之鱼,
      type: select,
      proxies: [ DIRECT ],
      use: [my],
      icon: https://cdn.jsdelivr.net/gh/wqdygkd/clash@main/IconSet/fish_color.svg,
    }

rule-providers:
