  #GEOIP 规则
  - GEOIP,private,全球直连,no-resolve
  - GEOIP,telegram,电报信息
  - GEOIP,CN,全球直连
  - MATCH,漏网之鱼

tun:
  enable: false
  stack: mixed
  auto-route: true
  auto-redirect: false
  auto-detect-interface: true
  dns-hijack:
    - any:53
  route-exclude-address: []
  mtu: 1500

dns:
  enable: true
  prefer-h3: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    #fakeip 过滤，以下地址不会下发 fakeip 映射用于连接
    - +.lan
    - +.local
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
    - "geosite:private"
  fake-ip-filter-mode: blacklist #可选 blacklist/whitelist ，默认 blacklist ，whitelist 即只有匹配成功才返回 fake-ip
  use-hosts: false #是否回应配置中的 hosts ，默认 true
  use-system-hosts: true #是否查询系统 hosts ，默认 true
  respect-rules: true #dns 连接遵守路由规则，需配置 proxy-server-nameserver
  default-nameserver:
    #默认 DNS, 用于解析 DNS 服务器 的域名，必须为 IP, 可为加密 DNS
    - tls://223.5.5.5
  nameserver:
    # 默认的域名解析服务器（直连优先，适合解析国内域名）
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    # 兜底解析服务器（更适合解析非国内/被墙域名；配合 respect-rules 可走代理链路）
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  nameserver-policy:
    # 国内域名走直连 DNS，减少误判与延迟
    "geosite:cn": https://dns.alidns.com/dns-query
    "geosite:private": system
    # 非中国/被墙域名优先用 fallback
    "geosite:gfw": https://cloudflare-dns.com/dns-query
    "geosite:geolocation-!cn": https://cloudflare-dns.com/dns-query
  proxy-server-nameserver:
    #代理节点域名解析服务器，仅用于解析代理节点的域名，如果不填则遵循 nameserver-policy 、nameserver 和 fallback 的配置
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  direct-nameserver:
    #用于 direct 出口域名解析的 DNS 服务器，如果不填则遵循 nameserver-policy 、nameserver 和 fallback 的配置
    - system
profile:
  store-selected: true
  store-fake-ip: true
geo-auto-update: true
geo-update-interval: 24
geodata-mode: false
geox-url:
  geoip: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
  geosite: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  mmdb: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb
  asn: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb
