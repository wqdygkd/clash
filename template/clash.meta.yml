    path: ./ruleset/QQMusic.yaml
    interval: 86400
  DouYin:
    type: http
    behavior: classical
    url: https://cdn.jsdelivr.net/gh/wqdygkd/clash@main/Ruleset/DouYin.yaml
    path: ./ruleset/DouYin.yaml
    interval: 86400
  Apple:
    type: http
    behavior: classical
    url: https://cdn.jsdelivr.net/gh/wqdygkd/clash@main/Ruleset/Apple.yaml
